<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versus Handmade</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --fundo-claro: #fcf9f5; 
            --fundo-quente: #f3eae0;
            --dourado: #b89352; 
            --texto: #2c2c2c; 
            --branco: #ffffff;
        }

        body { 
            margin: 0; 
            background-color: var(--fundo-claro);
            background-image: 
                url('https://www.transparenttextures.com/patterns/handmade-paper.png'), /* Textura de papel */
                linear-gradient(180deg, var(--fundo-claro) 0%, var(--fundo-quente) 100%);
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif; 
            color: var(--texto); 
        }
        
        header { text-align: center; padding: 60px 20px 30px 20px; }
        .brand-logo { max-width: 200px; height: auto; margin-bottom: 20px; }

        /* Mensagem de Boas-Vindas */
        .welcome-section { text-align: center; max-width: 600px; margin: 0 auto 50px auto; padding: 0 20px; }
        .welcome-section h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 400; margin-bottom: 10px; font-style: italic; }
        .welcome-section p { font-size: 0.9rem; letter-spacing: 1px; opacity: 0.8; line-height: 1.6; }

        /* Filtros */
        .filtros { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; flex-wrap: wrap; }
        .btn-filtro { background: none; border: none; border-bottom: 2px solid transparent; padding: 5px 12px; cursor: pointer; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; color: var(--texto); }
        .btn-filtro.active { border-bottom: 2px solid var(--dourado); color: var(--dourado); }

        /* Grelha */
        .mural { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 0 20px; max-width: 1200px; margin: 0 auto; }
        .produto { background: rgba(255,255,255,0.7); transition: 0.5s; text-align: center; padding-bottom: 30px; backdrop-filter: blur(5px); }
        .img-container { height: 420px; overflow: hidden; background: #eee; cursor: zoom-in; }
        .produto img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .produto:hover img { transform: scale(1.05); }
        
        /* Lightbox */
        #lightbox {
            display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(252,249,245,0.98); align-items: center; justify-content: center; cursor: zoom-out;
        }
        #lightbox img { max-width: 90%; max-height: 85%; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }

        .info h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin: 25px 0 10px; font-weight: 400; }
        .preco { color: var(--dourado); letter-spacing: 2px; margin-bottom: 20px; }
        .btn-whats { display: inline-block; text-decoration: none; border: 1px solid var(--texto); color: var(--texto); padding: 12px 30px; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .btn-whats:hover { background: var(--texto); color: white; }
        
        footer { text-align: center; padding: 100px; font-size: 0.7rem; letter-spacing: 3px; opacity: 0.4; }
    </style>
</head>
<body>

    <header><img src="logo.png" class="brand-logo"></header>

    <section class="welcome-section">
        <h1>Bem-vinda à Versus</h1>
        <p>Peças feitas à mão com alma e essência. Explore a nossa coleção de flores secas, velas e detalhes que contam histórias.</p>
    </section>
    
    <div class="filtros" id="filtros-container"></div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <section class="mural" id="lista-produtos"></section>

    <footer>VERSUS HANDMADE — PORTUGAL</footer>

    <script>
        const meuWhatsapp = "351910000000"; // ATUALIZA AQUI

        async function iniciar() {
            try {
                const res = await fetch('produtos.json');
                const produtos = await res.json();
                const container = document.getElementById('lista-produtos');
                const filtrosContainer = document.getElementById('filtros-container');

                function mostrar(lista, catAtiva) {
                    container.innerHTML = '';
                    document.querySelectorAll('.btn-filtro').forEach(btn => {
                        btn.classList.toggle('active', btn.innerText === catAtiva);
                    });

                    lista.forEach(p => {
                        container.innerHTML += `
                            <div class="produto">
                                <div class="img-container" onclick="ampliar('${p.imagem}')">
                                    <img src="${p.imagem}" onerror="this.src='https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?auto=format&fit=crop&w=800'">
                                </div>
                                <div class="info">
                                    <small style="letter-spacing:2px; opacity:0.6; text-transform:uppercase; font-size:0.6rem; display:block; margin-top:20px;">${p.categoria}</small>
                                    <h3>${p.nome}</h3>
                                    <p class="preco">${p.preco}€</p>
                                    <a href="https://wa.me/${meuWhatsapp}?text=Olá! Gostaria de saber mais sobre o produto: ${p.nome}" target="_blank" class="btn-whats">CONSULTAR</a>
                                </div>
                            </div>`;
                    });
                }

                const categorias = ['Todos', ...new Set(produtos.map(p => p.categoria))];
                categorias.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-filtro' + (cat === 'Todos' ? ' active' : '');
                    btn.innerText = cat;
                    btn.onclick = () => mostrar(cat === 'Todos' ? produtos : produtos.filter(p => p.categoria === cat), cat);
                    filtrosContainer.appendChild(btn);
                });
                mostrar(produtos, 'Todos');
            } catch (e) { console.error(e); }
        }

        function ampliar(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        iniciar();
    </script>
</body>
</html>
