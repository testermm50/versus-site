<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versus Handmade</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --fundo: #fcf9f5; --dourado: #b89352; --texto: #2c2c2c; }
        body { margin: 0; background-color: var(--fundo); font-family: 'Montserrat', sans-serif; color: var(--texto); }
        header { text-align: center; padding: 60px 20px; background: white; border-bottom: 1px solid #f3eae0; }
        .brand-logo { max-width: 200px; height: auto; }
        .mural { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .produto { background: white; text-align: center; padding-bottom: 30px; }
        .img-container { height: 400px; overflow: hidden; background: #f3eae0; cursor: zoom-in; }
        .produto img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .produto:hover img { opacity: 0.8; }
        
        /* Estilo da Foto Ampliada (Lightbox) */
        #lightbox {
            display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out;
        }
        #lightbox img { max-width: 90%; max-height: 80%; border: 3px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #lightbox-caption { color: white; position: absolute; bottom: 50px; font-family: 'Playfair Display', serif; font-size: 1.5rem; }

        .info h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 20px 0 5px; font-weight: 400; }
        .btn-whats { display: inline-block; text-decoration: none; border: 1px solid var(--texto); color: var(--texto); padding: 12px 30px; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header><img src="logo.png" class="brand-logo"></header>
    
    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
        <div id="lightbox-caption"></div>
    </div>

    <section class="mural" id="lista-produtos"></section>

    <script>
        const meuWhatsapp = "351910000000"; 

        async function iniciar() {
            try {
                // Tenta ler o ficheiro (corrige o nome se ainda estiver podrutos.json)
                const res = await fetch('produtos.json');
                const produtos = await res.json();
                const container = document.getElementById('lista-produtos');

                produtos.forEach(p => {
                    container.innerHTML += `
                        <div class="produto">
                            <div class="img-container" onclick="ampliar('${p.imagem}', '${p.nome}')">
                                <img src="${p.imagem}" onerror="this.src='https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?auto=format&fit=crop&w=800'">
                            </div>
                            <div class="info">
                                <h3>${p.nome}</h3>
                                <p>${p.preco}€</p>
                                <a href="https://wa.me/${meuWhatsapp}?text=Olá! Quero o produto: ${p.nome}" class="btn-whats">CONSULTAR</a>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error("Erro ao carregar ficheiro JSON."); }
        }

        function ampliar(src, nome) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-caption').innerText = nome;
            document.getElementById('lightbox.style.display')
            document.getElementById('lightbox').style.display = 'flex';
        }

        iniciar();
    </script>
</body>
</html>
