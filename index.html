<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versus Handmade | Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --fundo: #fdfaf7; --rosa-seco: #d4a3a3; --texto: #333333; --branco: #ffffff; }
        body { margin: 0; background-color: var(--fundo); background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png'); font-family: 'Montserrat', sans-serif; color: var(--texto); }
        header { text-align: center; padding: 60px 20px 20px; }
        .brand-logo { max-width: 180px; margin-bottom: 20px; }
        .welcome-section { text-align: center; max-width: 600px; margin: 0 auto 50px; padding: 0 20px; }
        .welcome-section h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 400; margin-bottom: 10px; color: var(--rosa-seco); }
        .welcome-section p { font-size: 0.9rem; letter-spacing: 1px; opacity: 0.7; line-height: 1.6; font-style: italic; }
        .filtros { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; }
        .btn-filtro { background: var(--branco); border: 1px solid #eee; padding: 8px 20px; cursor: pointer; font-size: 0.7rem; letter-spacing: 1px; border-radius: 25px; transition: 0.3s; color: var(--texto); }
        .btn-filtro.active { background: var(--rosa-seco); color: white; border-color: var(--rosa-seco); }
        .mural { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 0 20px; max-width: 1200px; margin: 0 auto; }
        .produto { background: var(--branco); border-radius: 25px; overflow: hidden; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.03); text-align: center; padding-bottom: 30px; }
        .produto:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(212, 163, 163, 0.2); }
        .img-container { height: 380px; overflow: hidden; cursor: zoom-in; }
        .produto img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }

        /* Lightbox com Descrição */
        #lightbox {
            display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(255,255,255,0.98); align-items: center; justify-content: center; cursor: zoom-out;
            flex-direction: column; text-align: center; padding: 20px;
        }
        #lightbox img { max-width: 90%; max-height: 70%; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #lightbox-text { max-width: 600px; padding: 0 20px; }
        #lightbox-nome { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 0; color: var(--rosa-seco); }
        #lightbox-desc { font-size: 0.95rem; line-height: 1.6; margin-top: 10px; color: #666; font-weight: 300; }

        .info { padding: 0 20px; }
        .info h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 25px 0 10px; font-weight: 400; }
        .preco { color: var(--rosa-seco); font-weight: 400; font-size: 1.1rem; margin-bottom: 20px; }
        .btn-insta { display: inline-block; text-decoration: none; background: var(--texto); color: white; padding: 12px 30px; font-size: 0.7rem; letter-spacing: 2px; border-radius: 30px; transition: 0.3s; }
        .btn-insta:hover { background: var(--rosa-seco); transform: scale(1.05); }
        footer { text-align: center; padding: 80px 20px; }
        .instagram-link { text-decoration: none; color: var(--rosa-seco); font-weight: 400; font-size: 0.9rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <header><img src="logo.png" class="brand-logo" alt="Versus Handmade Logo"></header>
    <section class="welcome-section">
        <h1>Bem-vindos à Versus</h1>
        <p>Peças feitas à mão com alma e essência. Flores secas, velas e detalhes que contam a sua história.</p>
    </section>
    <div class="filtros" id="filtros-container"></div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
        <div id="lightbox-text">
            <h2 id="lightbox-nome"></h2>
            <p id="lightbox-desc"></p>
        </div>
    </div>

    <section class="mural" id="lista-produtos"></section>
    <footer>
        <a href="https://instagram.com/versus_handmade" target="_blank" class="instagram-link">@versus_handmade</a>
        <p style="font-size: 0.6rem; opacity: 0.4; margin-top: 20px; letter-spacing: 2px;">VERSUS HANDMADE — PORTUGAL</p>
    </footer>

    <script>
        const linkInstagram = "https://instagram.com/versus_handmade"; 
        let produtosGlobal = [];

        async function iniciar() {
            try {
                const res = await fetch('produtos.json');
                produtosGlobal = await res.json();
                const container = document.getElementById('lista-produtos');
                const filtrosContainer = document.getElementById('filtros-container');

                function mostrar(lista, catAtiva) {
                    container.innerHTML = '';
                    document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.toggle('active', btn.innerText === catAtiva));
                    lista.forEach((p, index) => {
                        container.innerHTML += `
                            <div class="produto">
                                <div class="img-container" onclick="ampliar(${index}, event)">
                                    <img src="${p.imagem}" onerror="this.src='https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=800'">
                                </div>
                                <div class="info">
                                    <small style="opacity:0.5; text-transform:uppercase; font-size:0.6rem; display:block; margin-top:20px;">${p.categoria}</small>
                                    <h3>${p.nome}</h3>
                                    <p class="preco">${p.preco}€</p>
                                    <a href="${linkInstagram}" target="_blank" class="btn-insta">CONSULTAR</a>
                                </div>
                            </div>`;
                    });
                }

                const categorias = ['Todos', ...new Set(produtosGlobal.map(p => p.categoria))];
                categorias.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-filtro' + (cat === 'Todos' ? ' active' : '');
                    btn.innerText = cat;
                    btn.onclick = () => mostrar(cat === 'Todos' ? produtosGlobal : produtosGlobal.filter(p => p.categoria === cat), cat);
                    filtrosContainer.appendChild(btn);
                });
                mostrar(produtosGlobal, 'Todos');
            } catch (e) { console.error(e); }
        }

        function ampliar(index, event) {
            const p = produtosGlobal[index];
            document.getElementById('lightbox-img').src = p.imagem;
            document.getElementById('lightbox-nome').innerText = p.nome;
            document.getElementById('lightbox-desc').innerText = p.descricao || "Peça artesanal produzida com cuidado e dedicação.";
            document.getElementById('lightbox').style.display = 'flex';
        }

        iniciar();
    </script>
</body>
</html>
