<<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versus Handmade</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --fundo: #fcf9f5; --dourado: #b89352; --texto: #2c2c2c; }
        body { margin: 0; background-color: var(--fundo); font-family: 'Montserrat', sans-serif; color: var(--texto); }
        header { text-align: center; padding: 40px; background: white; border-bottom: 1px solid #eee; }
        .brand-logo { max-width: 150px; }
        .filtros { display: flex; justify-content: center; gap: 10px; margin: 30px 0; flex-wrap: wrap; }
        .btn-filtro { background: none; border: 1px solid #ccc; padding: 8px 15px; cursor: pointer; border-radius: 20px; font-size: 0.7rem; }
        .btn-filtro.active { background: var(--dourado); color: white; border-color: var(--dourado); }
        .mural { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .produto { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; padding-bottom: 20px; }
        .produto img { width: 100%; height: 300px; object-fit: cover; }
        .info h3 { font-family: 'Playfair Display', serif; margin: 15px 0 5px; }
        .btn-whats { display: inline-block; text-decoration: none; border: 1px solid var(--texto); color: var(--texto); padding: 8px 20px; font-size: 0.7rem; margin-top: 10px; }
    </style>
</head>
<body>
    <header><img src="logo.png" class="brand-logo"></header>
    <div class="filtros" id="filtros-container"></div>
    <section class="mural" id="lista-produtos"></section>

    <script>
        const meuWhatsapp = "351910000000"; // Muda para o teu número

        async function carregarProdutos() {
            const res = await fetch('produtos.json');
            const produtos = await res.json();
            
            const container = document.getElementById('lista-produtos');
            const filtros = document.getElementById('filtros-container');
            
            function mostrar(lista) {
                container.innerHTML = '';
                lista.forEach(p => {
                    container.innerHTML += `
                        <div class="produto">
                            <img src="${p.imagem}" onerror="this.src='https://via.placeholder.com/400x500?text=Sem+Foto'">
                            <div class="info">
                                <small>${p.categoria}</small>
                                <h3>${p.nome}</h3>
                                <p>${p.preco}€</p>
                                <a href="https://wa.me/${meuWhatsapp}?text=Olá, quero o ${p.nome}" class="btn-whats">ENCOMENDAR</a>
                            </div>
                        </div>`;
                });
            }

            // Criar botões de filtro automaticamente
            const cats = ['Todos', ...new Set(produtos.map(p => p.categoria))];
            cats.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn-filtro';
                b.innerText = c;
                b.onclick = () => mostrar(c === 'Todos' ? produtos : produtos.filter(p => p.categoria === c));
                filtros.appendChild(b);
            });

            mostrar(produtos);
        }
        carregarProdutos();
    </script>
</body>
</html>
